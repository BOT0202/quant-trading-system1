    <script>
        // 初始化信号分析图表
        document.addEventListener('DOMContentLoaded', function() {
            // 时间周期切换功能
            const timeframeButtons = document.querySelectorAll('.timeframe-tabs .btn');
            timeframeButtons.forEach(button => {
                button.addEventListener('click', function() {
                    timeframeButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 这里可以添加切换时间周期的逻辑
                    const timeframe = this.textContent;
                    console.log('切换到时间周期:', timeframe);
                });
            });
            
            // 回测功能
            const backtestButton = document.querySelector('.backtest-settings + .btn');
            backtestButton.addEventListener('click', function() {
                const timeframe = document.querySelector('.backtest-settings select').value;
                const initialCapital = document.querySelector('.backtest-settings input').value;
                
                console.log('开始回测:', {
                    timeframe: timeframe,
                    initialCapital: initialCapital
                });
                
                // 模拟回测结果
                setTimeout(() => {
                    alert('回测完成！收益率: +12.5%，胜率: 65%');
                }, 1000);
            });
        });
